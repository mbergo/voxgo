<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>voxgo</title>
<style>
  :root { --bg:#14100c; --card:#221b14; --fg:#e8ddcf; --accent:#e0862a; --muted:#8a7a66; --ok:#7bc26b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width:720px; margin:0 auto; padding:24px 16px; }
  h1 { font-size:28px; margin:0 0 4px; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .card { background:var(--card); border-radius:12px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:16px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 12px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button { background:var(--accent); color:#1a1207; border:0; border-radius:8px; padding:10px 18px;
           font-size:15px; font-weight:600; cursor:pointer; }
  button.secondary { background:#3a2f22; color:var(--fg); }
  button:disabled { opacity:.45; cursor:default; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--muted); display:inline-block; }
  .dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  select, textarea, input[type=text], input[type=number] {
    background:#191410; color:var(--fg); border:1px solid #3a2f22; border-radius:8px;
    padding:8px 10px; font-size:14px; width:100%; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:560px) { .grid { grid-template-columns:1fr; } }
  label.check { display:flex; align-items:center; gap:8px; font-size:14px; color:var(--fg);
    margin:0; cursor:pointer; }
  label.check input { width:auto; accent-color:var(--accent); }
  textarea { min-height:110px; resize:vertical; font-family:inherit; line-height:1.4; }
  #log { background:#191410; border-radius:8px; padding:12px; min-height:120px; max-height:280px;
         overflow-y:auto; font-size:14px; line-height:1.6; }
  #log .u { color:var(--fg); } #log .a { color:var(--accent); } #log .t { color:var(--ok); }
  .status { font-size:13px; color:var(--muted); }
  label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>vox<span>go</span></h1>
  <div class="sub">accent-friendly voice control · Irene at your service</div>

  <div class="card">
    <h2>Dictation</h2>
    <div class="row">
      <span class="dot" id="dictDot"></span>
      <button id="dictBtn" onclick="toggleDict()">Start</button>
      <span class="status" id="dictStatus">idle</span>
    </div>
  </div>

  <div class="card">
    <h2>Chat — Irene</h2>
    <div class="row" style="margin-bottom:10px">
      <span class="dot" id="chatDot"></span>
      <button id="chatBtn" onclick="toggleChat()">Start</button>
      <div style="flex:1;min-width:140px">
        <select id="voice">
          <option>shimmer</option><option>marin</option><option>cedar</option>
          <option>alloy</option><option>ash</option><option>ballad</option>
          <option>coral</option><option>echo</option><option>sage</option><option>verse</option>
        </select>
      </div>
    </div>
    <label for="prompt">Persona prompt (saved to config)</label>
    <textarea id="prompt"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="secondary" onclick="savePrompt()">Save prompt</button>
      <span class="status" id="promptStatus"></span>
    </div>
  </div>

  <div class="card">
    <h2>Settings</h2>
    <div class="grid">
      <div>
        <label for="vadSilence">Pause before send, in ms (higher gives you more time to think)</label>
        <input type="number" id="vadSilence" min="100" max="5000" step="100" placeholder="1000">
      </div>
      <div>
        <label for="vadThreshold">Mic sensitivity, 0 to 1 (higher ignores background noise)</label>
        <input type="number" id="vadThreshold" min="0.1" max="1" step="0.05" placeholder="0.5 / 0.6">
      </div>
      <div>
        <label for="sayVoice">Copilot voice (voxgo say)</label>
        <select id="sayVoice">
          <option>marin</option><option>shimmer</option><option>cedar</option>
          <option>alloy</option><option>ash</option><option>ballad</option>
          <option>coral</option><option>echo</option><option>sage</option><option>verse</option>
        </select>
      </div>
      <div>
        <label for="sink">Output device (VOXGO_SINK, blank = default)</label>
        <input type="text" id="sink" placeholder="alsa_output...">
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <label class="check"><input type="checkbox" id="interrupt"> Interrupt: talking over the voice cuts it off</label>
      <label class="check"><input type="checkbox" id="autoEnter"> Auto-send: press Enter after each dictated phrase</label>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="secondary" onclick="saveSettings()">Save settings</button>
      <span class="status" id="settingsStatus">applies on next start of dictation/chat</span>
    </div>
  </div>

  <div class="card">
    <h2>Live transcript</h2>
    <div id="log"></div>
  </div>
</div>
<script>
async function api(p, opts) { const r = await fetch(p, opts); return r.json(); }
function setState(s) {
  document.getElementById('dictDot').className = 'dot' + (s.dictating ? ' on' : '');
  document.getElementById('dictBtn').textContent = s.dictating ? 'Stop' : 'Start';
  document.getElementById('dictStatus').textContent = s.dictating ? 'listening' : 'idle';
  document.getElementById('chatDot').className = 'dot' + (s.chatting ? ' on' : '');
  document.getElementById('chatBtn').textContent = s.chatting ? 'Stop' : 'Start';
  if (!promptDirty) document.getElementById('prompt').value = s.prompt;
  if (s.voice) document.getElementById('voice').value = s.voice;
  setSettings(s.settings);
}
async function refresh() { setState(await api('/api/state')); }
async function toggleDict() { setState(await api('/api/dictation/toggle', {method:'POST'})); }
async function toggleChat() {
  const voice = document.getElementById('voice').value;
  setState(await api('/api/chat/toggle', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({voice})}));
}
let promptDirty = false;
document.getElementById('prompt').addEventListener('input', () => promptDirty = true);
let settingsDirty = false;
for (const id of ['vadSilence','vadThreshold','sayVoice','sink','interrupt','autoEnter'])
  document.getElementById(id).addEventListener('input', () => settingsDirty = true);
function setSettings(st) {
  if (settingsDirty || !st) return;
  document.getElementById('vadSilence').value = st.VOXGO_VAD_SILENCE_MS || '';
  document.getElementById('vadThreshold').value = st.VOXGO_VAD_THRESHOLD || '';
  if (st.VOXGO_SAY_VOICE) document.getElementById('sayVoice').value = st.VOXGO_SAY_VOICE;
  document.getElementById('sink').value = st.VOXGO_SINK || '';
  document.getElementById('interrupt').checked = st.VOXGO_INTERRUPT !== '0';
  document.getElementById('autoEnter').checked = st.VOXGO_ENTER === '1';
}
async function saveSettings() {
  const body = {
    VOXGO_VAD_SILENCE_MS: document.getElementById('vadSilence').value,
    VOXGO_VAD_THRESHOLD: document.getElementById('vadThreshold').value,
    VOXGO_SAY_VOICE: document.getElementById('sayVoice').value,
    VOXGO_SINK: document.getElementById('sink').value,
    VOXGO_INTERRUPT: document.getElementById('interrupt').checked ? '1' : '0',
    VOXGO_ENTER: document.getElementById('autoEnter').checked ? '1' : '0',
  };
  setState(await api('/api/settings', {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)}));
  settingsDirty = false;
  const el = document.getElementById('settingsStatus');
  el.textContent = 'saved ✓ (applies on next start)';
  setTimeout(() => el.textContent = 'applies on next start of dictation/chat', 2500);
}
async function savePrompt() {
  const prompt = document.getElementById('prompt').value;
  await api('/api/prompt', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({prompt})});
  promptDirty = false;
  const el = document.getElementById('promptStatus');
  el.textContent = 'saved ✓'; setTimeout(() => el.textContent = '', 2000);
}
const log = document.getElementById('log');
const es = new EventSource('/api/events');
es.onmessage = (e) => {
  const m = JSON.parse(e.data);
  const div = document.createElement('div');
  div.className = m.kind === 'user' ? 'u' : m.kind === 'assistant' ? 'a' : 't';
  div.textContent = (m.kind === 'user' ? '🧑 ' : m.kind === 'assistant' ? '😏 ' : '📝 ') + m.text;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
};
refresh(); setInterval(refresh, 3000);
</script>
</body>
</html>
