<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>voxgo</title>
<style>
  :root { --bg:#14100c; --card:#221b14; --fg:#e8ddcf; --accent:#e0862a; --muted:#8a7a66; --ok:#7bc26b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width:720px; margin:0 auto; padding:24px 16px; }
  h1 { font-size:28px; margin:0 0 4px; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .card { background:var(--card); border-radius:12px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 12px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button { background:var(--accent); color:#1a1207; border:0; border-radius:8px; padding:10px 18px;
           font-size:15px; font-weight:600; cursor:pointer; }
  button.secondary { background:#3a2f22; color:var(--fg); }
  button:disabled { opacity:.45; cursor:default; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--muted); display:inline-block; }
  .dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  select, textarea { background:#191410; color:var(--fg); border:1px solid #3a2f22; border-radius:8px;
                     padding:8px 10px; font-size:14px; width:100%; }
  textarea { min-height:110px; resize:vertical; font-family:inherit; line-height:1.4; }
  #log { background:#191410; border-radius:8px; padding:12px; min-height:120px; max-height:280px;
         overflow-y:auto; font-size:14px; line-height:1.6; }
  #log .u { color:var(--fg); } #log .a { color:var(--accent); } #log .t { color:var(--ok); }
  .status { font-size:13px; color:var(--muted); }
  label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>vox<span>go</span></h1>
  <div class="sub">accent-friendly voice control · Irene at your service</div>

  <div class="card">
    <h2>Dictation</h2>
    <div class="row">
      <span class="dot" id="dictDot"></span>
      <button id="dictBtn" onclick="toggleDict()">Start</button>
      <span class="status" id="dictStatus">idle</span>
    </div>
  </div>

  <div class="card">
    <h2>Chat — Irene</h2>
    <div class="row" style="margin-bottom:10px">
      <span class="dot" id="chatDot"></span>
      <button id="chatBtn" onclick="toggleChat()">Start</button>
      <div style="flex:1;min-width:140px">
        <select id="voice">
          <option>shimmer</option><option>marin</option><option>cedar</option>
          <option>alloy</option><option>ash</option><option>ballad</option>
          <option>coral</option><option>echo</option><option>sage</option><option>verse</option>
        </select>
      </div>
    </div>
    <label for="prompt">Persona prompt (saved to config)</label>
    <textarea id="prompt"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="secondary" onclick="savePrompt()">Save prompt</button>
      <span class="status" id="promptStatus"></span>
    </div>
  </div>

  <div class="card">
    <h2>Live transcript</h2>
    <div id="log"></div>
  </div>
</div>
<script>
async function api(p, opts) { const r = await fetch(p, opts); return r.json(); }
function setState(s) {
  document.getElementById('dictDot').className = 'dot' + (s.dictating ? ' on' : '');
  document.getElementById('dictBtn').textContent = s.dictating ? 'Stop' : 'Start';
  document.getElementById('dictStatus').textContent = s.dictating ? 'listening' : 'idle';
  document.getElementById('chatDot').className = 'dot' + (s.chatting ? ' on' : '');
  document.getElementById('chatBtn').textContent = s.chatting ? 'Stop' : 'Start';
  if (!promptDirty) document.getElementById('prompt').value = s.prompt;
  if (s.voice) document.getElementById('voice').value = s.voice;
}
async function refresh() { setState(await api('/api/state')); }
async function toggleDict() { setState(await api('/api/dictation/toggle', {method:'POST'})); }
async function toggleChat() {
  const voice = document.getElementById('voice').value;
  setState(await api('/api/chat/toggle', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({voice})}));
}
let promptDirty = false;
document.getElementById('prompt').addEventListener('input', () => promptDirty = true);
async function savePrompt() {
  const prompt = document.getElementById('prompt').value;
  await api('/api/prompt', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({prompt})});
  promptDirty = false;
  const el = document.getElementById('promptStatus');
  el.textContent = 'saved ✓'; setTimeout(() => el.textContent = '', 2000);
}
const log = document.getElementById('log');
const es = new EventSource('/api/events');
es.onmessage = (e) => {
  const m = JSON.parse(e.data);
  const div = document.createElement('div');
  div.className = m.kind === 'user' ? 'u' : m.kind === 'assistant' ? 'a' : 't';
  div.textContent = (m.kind === 'user' ? '🧑 ' : m.kind === 'assistant' ? '😏 ' : '📝 ') + m.text;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
};
refresh(); setInterval(refresh, 3000);
</script>
</body>
</html>
